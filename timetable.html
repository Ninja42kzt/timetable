    --bg2: #ffffff;
    --bg3: #ebebea;

    --muted: #8a8898;
    --accent: #534AB7;
    --class-bg: #E6F1FB;
    --class-border: #185FA5;
    --class-text: #0C447C;
    --deep-bg: #EEEDFE;
    --deep-border: #534AB7;

    --rest-bg: #FAEEDA;

    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);

    display: flex;
    align-items: center;
    justify-content: space-between;

  .header-right { display: flex; align-items: center; gap: 10px; }
  .theme-btn {

    background: var(--bg2);

  .progress-pill {

    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);

  .progress-pill b { color: var(--accent2); }
  .day-nav {

    padding: 0.75rem 1rem;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--bg);

  .day-btn {

    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);

    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--trans);

    border-color: var(--accent);

  .blocks { padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 6px; }

    border-left: 3px solid transparent;
    overflow: hidden;
    transition: opacity var(--trans);

  .block.done { opacity: var(--done-opacity); }
  .block-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;

    border: 1.5px solid currentColor;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all var(--trans);
    opacity: 0.5;

  .block.done .block-check::after { content: '✓'; color: var(--bg); font-weight: 700; }
  .block-main { flex: 1; min-width: 0; }
  .block-time { font-size: 11px; font-weight: 600; font-family: 'Space Mono', monospace; margin-bottom: 2px; letter-spacing: 0.02em; }
  .block-label { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .block-note { font-size: 12px; margin-top: 2px; opacity: 0.75; }
  .expand-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);

    flex-shrink: 0;

    width: 100%;
    background: rgba(0,0,0,0.15);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);

    font-size: 13px;
    padding: 8px 10px;
    resize: none;
    min-height: 60px;
    outline: none;

  .b-class .block-label { color: var(--class-text); filter: brightness(1.3); }

    { id:'sun6',  time:'15:00–17:00',label:'Free time (intentional)', type:'routine', note:'Walk, rest, IG — no guilt, this is earned recovery'},
    { id:'sun7',  time:'17:00–19:00',label:'Plan full week ahead', type:'routine', note:'Set language goals per day, assign CTF targets, note hardest upcoming classes'},
    { id:'sun8',  time:'19:00–20:00',label:'Dinner + break', type:'routine', note:''},
    { id:'sun9',  time:'20:00–21:00',label:'Music production — low intensity', type:'deep', note:'Creative wind-down — sounds, voices, ambience'},
    { id:'sun10', time:'21:00–23:00',label:'Wind-down', type:'rest', note:'Prep for the week — pack bag, set alarm, no screens after 22:30'},
    { id:'sun11', time:'23:00',       label:'Sleep', type:'rest', note:'6 hrs — wake 5am'},
  ],
};

let activeDay = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1] || 'Mon';
let state = JSON.parse(localStorage.getItem('csf_state') || '{}');

function save() { localStorage.setItem('csf_state', JSON.stringify(state)); }

function totalDone() {
  return Object.values(state).filter(v => v && v.done).length;
}

function renderProgress() {
  const n = totalDone();
  document.getElementById('progress-pill').innerHTML = '<b>' + n + '</b> done';
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  DAYS.forEach(d => {
    const b = document.createElement('button');
    b.className = 'day-btn' + (d === activeDay ? ' active' : '');
    b.textContent = d;
    b.onclick = () => { activeDay = d; renderNav(); renderBlocks(); };
    nav.appendChild(b);
  });
}

function renderBlocks() {
  const container = document.getElementById('blocks');
  const items = SCHEDULE[activeDay] || [];
  container.innerHTML = '';
  items.forEach(item => {
    const s = state[item.id] || {};
    const done = !!s.done;
    const userNote = s.note || '';
    const open = !!s.open;

    const block = document.createElement('div');
    block.className = 'block b-' + item.type + (done ? ' done' : '');
    block.innerHTML = `
      <div class="block-header">
        <div class="block-check"></div>
        <div class="block-main">
          <div class="block-time">${item.time}</div>
          <div class="block-label">${item.label}</div>
          ${item.note ? '<div class="block-note">' + item.note + '</div>' : ''}
        </div>
        <button class="expand-btn" title="Add note">${open ? '▲' : '✎'}</button>
      </div>
      <div class="block-notes-area ${open ? 'open' : ''}">
        <textarea placeholder="Add your own note for this block…" rows="2">${userNote}</textarea>
      </div>
    `;

    const check = block.querySelector('.block-check');
    check.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!state[item.id]) state[item.id] = {};
      state[item.id].done = !state[item.id].done;
      save();
      renderBlocks();
      renderProgress();
    });

    const expandBtn = block.querySelector('.expand-btn');
    const notesArea = block.querySelector('.block-notes-area');
    expandBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!state[item.id]) state[item.id] = {};
      state[item.id].open = !state[item.id].open;
      save();
      notesArea.classList.toggle('open');
      expandBtn.textContent = notesArea.classList.contains('open') ? '▲' : '✎';
    });

    const textarea = block.querySelector('textarea');
    textarea.addEventListener('input', () => {
      if (!state[item.id]) state[item.id] = {};
      state[item.id].note = textarea.value;
      save();
    });

    container.appendChild(block);
  });
}

// theme
const themBtn = document.getElementById('theme-btn');
let dark = localStorage.getItem('csf_theme') !== 'light';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themBtn.textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('csf_theme', dark ? 'dark' : 'light');
}
themBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });
applyTheme();

renderNav();
renderBlocks();
renderProgress();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
