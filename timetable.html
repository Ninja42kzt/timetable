<style>
:root{--bg:#0e0e14;--bg2:#16161f;--bg3:#1e1e2a;--border:rgba(255,255,255,0.07);--text:#f0eeff;--muted:#7e7d99;--accent:#7f77dd;--accent2:#5dcaa5;--class-bg:rgba(55,138,221,0.12);--class-border:#378ADD;--class-text:#85B7EB;--deep-bg:rgba(127,119,221,0.12);--deep-border:#7f77dd;--deep-text:#AFA9EC;--workout-bg:rgba(99,153,34,0.12);--workout-border:#639922;--workout-text:#97C459;--routine-bg:rgba(136,135,128,0.08);--routine-border:#5F5E5A;--routine-text:#888780;--rest-bg:rgba(186,117,23,0.12);--rest-border:#BA7517;--rest-text:#FAC775;--online-bg:rgba(93,202,165,0.12);--online-border:#1D9E75;--online-text:#5DCAA5;--done-opacity:0.35;--radius:10px;--trans:0.18s ease;}
[data-theme="light"]{--bg:#f5f4f0;--bg2:#fff;--bg3:#ebebea;--border:rgba(0,0,0,0.08);--text:#1a1a2e;--muted:#8a8898;--accent:#534AB7;--class-bg:#E6F1FB;--class-border:#185FA5;--class-text:#0C447C;--deep-bg:#EEEDFE;--deep-border:#534AB7;--deep-text:#3C3489;--workout-bg:#EAF3DE;--workout-border:#3B6D11;--workout-text:#27500A;--routine-bg:#F1EFE8;--routine-border:#5F5E5A;--routine-text:#444441;--rest-bg:#FAEEDA;--rest-border:#854F0B;--rest-text:#633806;--online-bg:#E1F5EE;--online-border:#0F6E56;--online-text:#085041;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100%;padding-bottom:4rem;transition:background var(--trans),color var(--trans);}
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:0.08em;color:var(--accent);}
.logo span{color:var(--muted);font-weight:400;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--trans);}
.icon-btn:hover{background:var(--bg3);}
.pill{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);background:var(--bg3);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.pill b{color:var(--accent2);}
.day-nav{display:flex;gap:6px;padding:0.75rem 1rem;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.day-nav::-webkit-scrollbar{display:none;}
.day-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all var(--trans);}
.day-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.day-btn:hover:not(.active){border-color:var(--accent);color:var(--text);}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:0.6rem 1rem;border-bottom:1px solid var(--border);}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.blocks{padding:0.75rem 1rem;display:flex;flex-direction:column;gap:6px;}
.block{border-radius:var(--radius);border-left:3px solid transparent;overflow:hidden;transition:opacity var(--trans);}
.block.done{opacity:var(--done-opacity);}
.block-header{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;cursor:pointer;user-select:none;}
.block-check{width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all var(--trans);opacity:0.5;}
.block.done .block-check{opacity:1;background:currentColor;}
.block.done .block-check::after{content:'✓';color:var(--bg);font-weight:700;}
.block-main{flex:1;min-width:0;}
.block-time{font-size:11px;font-weight:600;font-family:'Space Mono',monospace;margin-bottom:2px;letter-spacing:0.02em;}
.block-label{font-size:14px;font-weight:500;line-height:1.3;}
.block-sub{font-size:12px;margin-top:2px;color:var(--muted);}
.block-note-preview{font-size:12px;margin-top:3px;color:var(--accent2);}
.act-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.05);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);flex-shrink:0;margin-top:2px;transition:all var(--trans);}
[data-theme="light"] .act-btn{background:rgba(0,0,0,0.04);}
.act-btn:hover{background:rgba(255,255,255,0.12);}
.block-expand{display:none;padding:0 12px 12px 40px;flex-direction:column;gap:10px;}
.block-expand.open{display:flex;}
.exp-label{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:0.04em;margin-bottom:3px;}
.exp-input,.exp-textarea{background:rgba(0,0,0,0.15);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border var(--trans);width:100%;}
[data-theme="light"] .exp-input,[data-theme="light"] .exp-textarea{background:rgba(0,0,0,0.04);}
.exp-input:focus,.exp-textarea:focus{border-color:var(--accent);}
.exp-textarea{resize:none;min-height:72px;}
.exp-input::placeholder,.exp-textarea::placeholder{color:var(--muted);}
.b-class{background:var(--class-bg);border-color:var(--class-border);}
.b-class .block-time,.b-class .block-check{color:var(--class-text);}
.b-class .block-label{color:var(--class-text);filter:brightness(1.3);}
[data-theme="light"] .b-class .block-label{filter:none;color:var(--class-border);}
.b-online{background:var(--online-bg);border-color:var(--online-border);}
.b-online .block-time,.b-online .block-check{color:var(--online-text);}
.b-online .block-label{color:var(--online-text);}
[data-theme="light"] .b-online .block-label{color:var(--online-border);}
.b-deep{background:var(--deep-bg);border-color:var(--deep-border);}
.b-deep .block-time,.b-deep .block-check{color:var(--deep-text);}
.b-deep .block-label{color:var(--deep-text);filter:brightness(1.3);}
[data-theme="light"] .b-deep .block-label{filter:none;color:var(--deep-border);}
.b-workout{background:var(--workout-bg);border-color:var(--workout-border);}
.b-workout .block-time,.b-workout .block-check{color:var(--workout-text);}
.b-workout .block-label{color:var(--workout-text);filter:brightness(1.3);}
[data-theme="light"] .b-workout .block-label{filter:none;color:var(--workout-border);}
.b-routine{background:var(--routine-bg);border-color:var(--routine-border);}
.b-routine .block-time,.b-routine .block-check{color:var(--routine-text);}
.b-routine .block-label{color:var(--routine-text);filter:brightness(1.3);}
[data-theme="light"] .b-routine .block-label{filter:none;color:var(--routine-border);}
.b-rest{background:var(--rest-bg);border-color:var(--rest-border);}
.b-rest .block-time,.b-rest .block-check{color:var(--rest-text);}
.b-rest .block-label{color:var(--rest-text);filter:brightness(1.3);}
[data-theme="light"] .b-rest .block-label{filter:none;color:var(--rest-border);}
</style>
</head>

let activeDay=DAYS[new Date().getDay()===0?6:new Date().getDay()-1]||'Mon';
let state={};
try{state=JSON.parse(localStorage.getItem('csf_state')||'{}');}catch(e){}
function save(){try{localStorage.setItem('csf_state',JSON.stringify(state));}catch(e){}}
function totalDone(){return Object.values(state).filter(v=>v&&v.done).length;}
function renderProgress(){document.getElementById('progress-pill').innerHTML='<b>'+totalDone()+'</b> done';}

function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  DAYS.forEach(d=>{

    b.className='day-btn'+(d===activeDay?' active':'');
    b.textContent=d;
    b.onclick=()=>{activeDay=d;renderNav();renderBlocks();};
    nav.appendChild(b);
  });
}

function renderBlocks(){
  const container=document.getElementById('blocks');
  const items=SCHEDULE[activeDay]||[];
  container.innerHTML='';
  items.forEach(item=>{

    const done=!!s.done;
    const open=!!s.open;
    const customLabel=s.label||'';
    const customNote=s.note||'';
    const displayLabel=customLabel||item.label;

    const block=document.createElement('div');
    block.className='block b-'+item.type+(done?' done':'');
    block.innerHTML=`
      <div class="block-header">
        <div class="block-check"></div>
        <div class="block-main">
          <div class="block-time">${item.time}</div>
          <div class="block-label">${displayLabel}</div>
          ${item.sub?'<div class="block-sub">'+item.sub+'</div>':''}
          ${customNote?'<div class="block-note-preview">'+customNote.substring(0,70)+(customNote.length>70?'…':'')+'</div>':''}
        </div>
        <button class="act-btn edit-btn" title="Edit">${open?'▲':'✎'}</button>
      </div>
      <div class="block-expand ${open?'open':''}">
        <div>
          <div class="exp-label">EDIT TOPIC</div>
          <input class="exp-input topic-input" placeholder="${item.label}" value="${customLabel}">
        </div>
        <div>
          <div class="exp-label">YOUR NOTES</div>
          <textarea class="exp-textarea note-input" placeholder="Add notes, key points, reminders…" rows="3">${customNote}</textarea>
        </div>
      </div>
    `;

    block.querySelector('.block-check').addEventListener('click',e=>{
      e.stopPropagation();
      if(!state[item.id])state[item.id]={};
      state[item.id].done=!state[item.id].done;
      save();renderBlocks();renderProgress();
    });

    const editBtn=block.querySelector('.edit-btn');
    const expandEl=block.querySelector('.block-expand');
    editBtn.addEventListener('click',e=>{
      e.stopPropagation();
      if(!state[item.id])state[item.id]={};
      state[item.id].open=!state[item.id].open;
      save();
      expandEl.classList.toggle('open');
      editBtn.textContent=expandEl.classList.contains('open')?'▲':'✎';
    });

    block.querySelector('.topic-input').addEventListener('input',function(){
      if(!state[item.id])state[item.id]={};
      state[item.id].label=this.value;
      block.querySelector('.block-label').textContent=this.value||item.label;
      save();
    });

    block.querySelector('.note-input').addEventListener('input',function(){
      if(!state[item.id])state[item.id]={};
      state[item.id].note=this.value;
      save();
    });

    container.appendChild(block);
  });
}

const themBtn=document.getElementById('theme-btn');
let dark=localStorage.getItem('csf_theme')!=='light';
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  themBtn.textContent=dark?'🌙':'☀️';
  localStorage.setItem('csf_theme',dark?'dark':'light');
}
themBtn.addEventListener('click',()=>{dark=!dark;applyTheme();});
applyTheme();
renderNav();renderBlocks();renderProgress();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
</body>
</html>
